name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Pack
        run: npm pack

  install-smoke:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Pack
        run: npm pack

      - name: Install Tarball (Unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          MONKCLI_PREFIX: ${{ github.workspace }}/.npm-global
        run: |
          TARBALL="$(find . -maxdepth 1 -name '*.tgz' | head -n 1)"
          npm install -g "$TARBALL" --prefix "$MONKCLI_PREFIX"
          test -x "$MONKCLI_PREFIX/bin/monkcli"
          "$MONKCLI_PREFIX/bin/monkcli" --version

      - name: Install Tarball (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          MONKCLI_PREFIX: ${{ github.workspace }}\.npm-global
        run: |
          $tarball = Get-ChildItem -Filter *.tgz | Select-Object -First 1
          npm install -g $tarball.FullName --prefix $env:MONKCLI_PREFIX
          $binary = Join-Path $env:MONKCLI_PREFIX "monkcli.cmd"
          if (!(Test-Path $binary)) {
            Write-Error "monkcli.cmd not found"
            exit 1
          }
          & $binary --version
